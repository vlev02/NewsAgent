# Agent configurations for NewsAgent pipeline
# This file defines the settings for each data source agent

agents:
  XUNFEI:
    name: "Xunfei Spark"
    enabled: true
    type: "LLM_SEARCH"
    endpoint: "https://spark-api-open.xf-yun.com/v1/chat/completions"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: true
      supports_streaming: false
      needs_json_extraction: true
    defaults:
      model: "4.0Ultra"
      temperature: 0.3
      max_tokens: 4000
      search_mode: "deep"

  BOCHA:
    name: "BOCHA Web Search"
    enabled: true
    type: "REST_API"
    endpoint: "https://api.bochaai.com/v1/web-search"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: true
      supports_streaming: false
      needs_json_extraction: false
    defaults:
      count: 10
      summary: true

  HUNYUAN:
    name: "Tencent Hunyuan"
    enabled: true
    type: "LLM_SEARCH"
    endpoint: "https://hunyuan.tencentcloudapi.com"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: true
      supports_streaming: false
      needs_json_extraction: true
    defaults:
      model: "hunyuan-turbo"
      temperature: 0.3
      enable_enhancement: true
      search_info: true

  QIANFAN:
    name: "Baidu Qianfan"
    enabled: true
    type: "LLM_SEARCH"
    endpoint: "https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: true
      supports_streaming: false
      needs_json_extraction: false
    defaults:
      model: "deepseek-r1"
      search_source: "baidu_search_v2"
      enable_reasoning: true
      temperature: 1e-10
      top_p: 1e-10
      max_completion_tokens: 20480

  META:
    name: "MetaSo Search"
    enabled: true
    type: "REST_API"
    endpoint: "https://api.metaso.cn/search"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: false
      supports_streaming: false
      needs_json_extraction: false
    defaults:
      scope: "webpage"
      size: 10
      includeRawContent: false

  TWITTER:
    name: "Twitter/X API v2"
    enabled: true
    type: "SOCIAL_MEDIA"
    endpoint: "https://api.twitter.com/2"
    capabilities:
      supports_time_filter: true
      supports_ai_summary: false
      supports_streaming: false
      needs_json_extraction: false
    defaults:
      sort_order: "recency"
      max_results: 10
