# Agent configurations using Hydra-style hierarchy
# Structure: base_agent → agent_types → agent overrides
# This allows minimal duplication and clear inheritance

# ==============================================================================
# BASE_AGENT: Base configuration for all agents
# ==============================================================================
base_agent:
  auth_header: "Authorization"
  auth_prefix: "Bearer"

# ==============================================================================
# AGENT_TYPES: Configuration by agent type
# ==============================================================================
agent_types:
  LLM_SEARCH:
    # LLM-based agents: XUNFEI, HUNYUAN, QIANFAN
    temperature: 0.3
    # Note: model and other LLM-specific params defined per agent

  REST_API:
    # REST API agents: BOCHA, META
    # Default query string for search
    query: "人工智能"

  SOCIAL_MEDIA:
    # Social media agents: TWITTER
    sort_order: "recency"
    max_results: 10

# ==============================================================================
# AGENTS: Agent-specific overrides only
# (Inherit from defaults + type_defaults, then override as needed)
# ==============================================================================
agents:
  # LLM_SEARCH AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  XUNFEI:
    type: "LLM_SEARCH"
    endpoint: "https://spark-api-open.xf-yun.com/v1/chat/completions"
    auth_header: "Authorization"  # Standard Bearer token

    # Template configuration (separate from query_body)
    # Specifies where and how to load Jinja2 templates
    template:
      path: "src/templates/xunfei_prompt.jinja2"  # Can be relative or absolute
      name: "xunfei_prompt"                        # For reference/identification

    # Template variables for Jinja2 prompt rendering
    # These variables are used to render the Jinja2 template
    # Can be modified at runtime via agent.template_vars setter
    template_vars:
      query_fields:
        - "自动驾驶"
        - "具身智能"
        - "大模型"
        - "人工智能"
      query_topics:
        - "特斯拉FSD"
        - "人形机器人"
        - "AI大模型突破"
        - "行业重要动态"
      current_date: "2025-11-21"
      language: "中文"

    # API request body configuration (separate from template)
    # These are the actual parameters sent to the Xunfei API
    # Can be modified at runtime via agent.request_body_args setter
    query_body:
      model: "4.0Ultra"
      user: "tech_news_agent"
      stream: false
      temperature: 0.3
      max_tokens: 4000
      search_mode: "deep"

  HUNYUAN:
    type: "LLM_SEARCH"
    endpoint: "https://api.hunyuan.cloud.tencent.com/v1/chat/completions"
    auth_header: "Authorization"  # Standard Bearer token

    # Template configuration (separate from query_body)
    # Specifies where and how to load Jinja2 templates
    template:
      path: "src/templates/hunyuan_prompt.jinja2"  # Can be relative or absolute
      name: "hunyuan_prompt"                        # For reference/identification

    # Template variables for Jinja2 prompt rendering
    # These variables are used to render the Jinja2 template
    # Can be modified at runtime via agent.template_vars setter
    template_vars:
      query_fields:
        - "自动驾驶"
        - "具身智能"
        - "大模型"
        - "人工智能"
      query_topics:
        - "特斯拉FSD"
        - "人形机器人"
        - "AI大模型突破"
        - "行业重要动态"
      time_description: "最近一周"
      current_date: "2025-11-21"
      language: "中文"
      enable_categorization: true

    # API request body configuration (separate from template)
    # These are the actual parameters sent to the Hunyuan API
    # Can be modified at runtime via agent.request_body_args setter
    query_body:
      model: "hunyuan-turbo"
      stream: false
      temperature: 0.3
      enable_enhancement: true
      search_info: true

  QIANFAN:
    type: "LLM_SEARCH"
    endpoint: "https://qianfan.baidubce.com/v2/ai_search/chat/completions"
    auth_header: "X-Appbuilder-Authorization"  # Override default

    # Template configuration (separate from query_body)
    # Specifies where and how to load Jinja2 templates
    template:
      path: "src/templates/qianfan_prompt.jinja2"  # Can be relative or absolute
      name: "qianfan_prompt"                       # For reference/identification

    # Template variables for Jinja2 prompt rendering
    # These variables are used to render the Jinja2 template
    # Can be modified at runtime via agent.template_vars setter
    template_vars:
      query_fields:
        - "自动驾驶"
        - "具身智能"
        - "大模型"
        - "人工智能"
      query_topics:
        - "特斯拉FSD"
        - "人形机器人"
        - "AI大模型突破"
        - "行业重要动态"
      time_description: "最近一周"
      resource_types:
        - "网页"
        - "图片"
        - "视频"
      language: "中文"
      enable_reasoning: true

    # API request body configuration (separate from template)
    # These are the actual parameters sent to the Qianfan API
    # Can be modified at runtime via agent.request_body_args setter
    query_body:
      model: "deepseek-r1"
      stream: false
      temperature: "1e-10"
      top_p: "1e-10"
      search_source: "baidu_search_v2"
      search_mode: "required"
      search_recency_filter: "week"

      # Resource type filtering configuration
      resource_config:
        image: 4
        video: 4
        web: 4

      # Search behavior
      enable_deep_search: false
      enable_corner_markers: true
      enable_followup_queries: false
      max_search_query_num: 10
      max_completion_tokens: "20480"
      enable_reasoning: true

  # REST_API AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  BOCHA:
    type: "REST_API"
    endpoint: "https://api.bochaai.com/v1/web-search"
    query_body:
      query: "人工智能"
      freshness: "oneWeek"
      count: 10
      summary: true

  META:
    type: "REST_API"
    endpoint: "https://metaso.cn/api/v1/search"
    query_body:
      q: "人工智能"
      scope: "webpage"
      size: "10"
      includeSummary: false
      includeRawContent: true
      conciseSnippet: true

  # SOCIAL_MEDIA AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  TWITTER:
    type: "SOCIAL_MEDIA"
    endpoint: "https://api.twitter.com/2"
    query_body:
      sort_order: "recency"
      max_results: 10
