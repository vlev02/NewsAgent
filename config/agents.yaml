# Agent configurations using Hydra-style hierarchy
# Structure: base_agent → agent_types → agent overrides
# This allows minimal duplication and clear inheritance

# ==============================================================================
# BASE_AGENT: Base configuration for all agents
# ==============================================================================
base_agent:
  auth_header: "Authorization"
  auth_prefix: "Bearer"
  language: "zh"

# ==============================================================================
# AGENT_TYPES: Configuration by agent type
# ==============================================================================
agent_types:
  LLM_SEARCH:
    # LLM-based agents: XUNFEI, HUNYUAN, QIANFAN
    temperature: 0.3
    # Note: model and other LLM-specific params defined per agent

  REST_API:
    # REST API agents: BOCHA, META
    # Default query string for search
    query: "人工智能"

  SOCIAL_MEDIA:
    # Social media agents: TWITTER
    sort_order: "recency"
    max_results: 10

# ==============================================================================
# AGENTS: Agent-specific overrides only
# (Inherit from defaults + type_defaults, then override as needed)
# ==============================================================================
agents:
  # LLM_SEARCH AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  XUNFEI:
    name: "Xunfei Spark"
    type: "LLM_SEARCH"
    endpoint: "https://spark-api-open.xf-yun.com/v1/chat/completions"
    auth_header: "Authorization"  # Override default if different
    query_body:
      model: "4.0Ultra"
      temperature: 0.3
      max_tokens: 4000
      search_mode: "deep"
      # language: inherited from base_agent

  HUNYUAN:
    name: "Tencent Hunyuan"
    type: "LLM_SEARCH"
    endpoint: "https://hunyuan.tencentcloudapi.com"
    query_body:
      model: "hunyuan-turbo"
      temperature: 0.3
      enable_enhancement: true
      search_info: true

  QIANFAN:
    name: "Baidu Qianfan"
    type: "LLM_SEARCH"
    endpoint: "https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/"
    auth_header: "X-Appbuilder-Authorization"  # Override default
    query_body:
      model: "deepseek-r1"
      search_source: "baidu_search_v2"
      enable_reasoning: true
      temperature: 1e-10
      top_p: 1e-10
      max_completion_tokens: 20480

  # REST_API AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  BOCHA:
    name: "BOCHA Web Search"
    type: "REST_API"
    endpoint: "https://api.bochaai.com/v1/web-search"
    query_body:
      query: "人工智能"
      freshness: "oneWeek"
      count: 10
      summary: true

  META:
    name: "MetaSo Search"
    type: "REST_API"
    endpoint: "https://metaso.cn/api/v1/search"
    query_body:
      q: "人工智能"
      scope: "webpage"
      size: "10"
      includeSummary: false
      includeRawContent: true
      conciseSnippet: true

  # SOCIAL_MEDIA AGENTS
  # ─────────────────────────────────────────────────────────────────────────

  TWITTER:
    name: "Twitter/X API v2"
    type: "SOCIAL_MEDIA"
    endpoint: "https://api.twitter.com/2"
    query_body:
      sort_order: "recency"
      max_results: 10
