# Data Manager Configuration
# Defines storage backend, database settings, and data retention policies

# Storage configuration
storage:
  backend: "sqlite"           # Only SQLite supported currently
  database:
    path: "data/data_manager.db"  # Relative to project root
    timeout: 5.0              # Connection timeout in seconds
    check_same_thread: false  # Allow multi-threaded access

# Data models configuration
models:
  - name: "request_model"
    table: "request_models"
    description: "Complete raw API request and response log"

  - name: "query_model"
    table: "query_models"
    description: "Structured query information"

  - name: "response_item"
    table: "response_items"
    description: "Single search result item"

# Cascade configuration (delete behavior)
cascade:
  # When RequestModel is deleted, cascade delete associated QueryModels and ResponseItems
  request_delete_cascade: true
  # When QueryModel is deleted, cascade delete associated ResponseItems
  query_delete_cascade: true

# Data retention policies
retention:
  # Keep all historical data (no automatic purging)
  # Future: could add "days_to_keep" per model
  enabled: false

# Logging and debugging
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_all_operations: false  # Log every record/retrieve/explore call
